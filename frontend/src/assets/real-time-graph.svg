    </linearGradient>
    <filter id="shadow2" x="-40" y="-40" width="1280" height="980" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0A2540" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="900" rx="48" fill="url(#bg2)"/>

