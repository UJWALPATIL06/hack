<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1200" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A2540" stop-opacity="0.08"/>
      <stop offset="0.45" stop-color="#3A86FF" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="lineA" x1="180" y1="630" x2="1020" y2="320" gradientUnits="userSpaceOnUse">
