    <g>
      <circle cx="220" cy="602" r="10" fill="#3A86FF"/>
      <circle cx="380" cy="510" r="10" fill="#3A86FF"/>
      <circle cx="500" cy="432" r="10" fill="#3A86FF"/>
      <circle cx="700" cy="372" r="10" fill="#22C55E"/>
