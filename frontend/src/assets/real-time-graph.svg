    <rect x="740" y="344" width="110" height="12" rx="6" fill="#E2E8F0" fill-opacity="0.95"/>
    <rect x="740" y="366" width="150" height="12" rx="6" fill="#E2E8F0" fill-opacity="0.75"/>
    <rect x="740" y="388" width="90" height="12" rx="6" fill="#E2E8F0" fill-opacity="0.65"/>

