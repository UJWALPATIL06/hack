      <line x1="220" y1="372" x2="980" y2="372"/>
      <line x1="220" y1="432" x2="980" y2="432"/>
      <line x1="220" y1="492" x2="980" y2="492"/>
      <line x1="220" y1="552" x2="980" y2="552"/>
